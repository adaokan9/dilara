<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Me Valentine</title>

<style>

body{
background:#ffd6e7;
font-family: Arial, Helvetica, sans-serif;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
position:relative;
}

h1{
font-size:35px;
color:#ff4d88;
}

.buttons{
margin-top:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
position:absolute;
}

#yes{
background:#ff4d88;
color:white;
left:50px;
}

#no{
background:#999;
color:white;
left:200px;
}

#result{
margin-top:40px;
font-size:30px;
color:#ff4d88;
display:none;
}

img{
width:200px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<img id="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<h1>Do You Love Me ? ❤️</h1>

<div class="buttons">
<button id="yes">Yes ❤️</button>
<button id="no">No 💔</button>
</div>

<h2 id="result">I knew it 😍</h2>

</div>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const result = document.getElementById("result");

noBtn.addEventListener("mouseover", () => {

const container = document.querySelector(".container");

const maxX = container.clientWidth - noBtn.clientWidth;
const maxY = container.clientHeight - noBtn.clientHeight;

const randomX = Math.floor(Math.random() * maxX);
const randomY = Math.floor(Math.random() * maxY);

noBtn.style.left = randomX + "px";
noBtn.style.top = randomY + "px";

});

yesBtn.addEventListener("click", () => {

result.style.display = "block";
document.getElementById("gif").src =
"https://media.giphy.com/media/l2QDM9Jnim1YVILXa/giphy.gif";

});

</script>

</body>
</html>
